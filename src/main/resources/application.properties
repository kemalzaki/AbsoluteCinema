# Konfigurasi Gmail OTP
# Kredensial dari env vars (jangan hardcode di repo).
# Spring Boot mail starter tetap booting walau kredensial kosong; error hanya
# muncul saat email benar-benar dikirim. Set di Railway: MAIL_USERNAME / MAIL_PASSWORD.
#
# Port 465 + ssl.enable = implicit TLS (langsung TLS di socket). Port 587
# (STARTTLS) sering diblok/di-throttle Google pada IP cloud provider —
# connection timeout tanpa auth error. Port 465 kadian lolos karena jalur
# firewall/load-balancer berbeda.
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
# Timeout eksplisit (ms) supaya kegagalan koneksi cepat dilaporkan, bukan
# hang sampai OS TCP timeout. Default angus-mail = infinite (-1).
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — AbsoluteCinema</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <header th:replace="~{fragments/header :: header}"></header>

    <main class="page container">
        <h2 style="margin-bottom: 0.5rem;">Admin Panel</h2>
        <p class="auth-subtitle" style="margin-bottom: 1.5rem;">
            Tambah tayangan baru. URL gambar disimpan di database agar tidak hilang saat redeploy.
        </p>

        <!-- Success / error flash -->
        <div class="alert alert-success" th:if="${param.added}">
            Tayangan berhasil ditambahkan
            (<span th:text="${param.added}">FILM</span>).
        </div>
        <div class="alert alert-error" th:if="${param.error}" th:text="${param.error}">
            Terjadi kesalahan.
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:2rem; align-items:start;">

            <!-- ===== FILM FORM ===== -->
            <section>
                <h3 class="section-title">Tambah Film</h3>
                <form th:action="@{/admin/film}" method="post">
                    <div class="form-group">
                        <label class="form-label">Judul *</label>
                        <input type="text" name="judul" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Tahun Rilis *</label>
                        <input type="number" name="tahunRilis" class="form-control"
                               min="1888" max="2100" value="2026" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Durasi (menit) *</label>
                        <input type="number" name="durasiMenit" class="form-control"
                               min="1" value="120" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Genre</label>
                        <input type="text" name="genre" class="form-control" placeholder="Drama">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Sutradara</label>
                        <input type="text" name="sutradara" class="form-control">
                    </div>
                    <div class="form-group">
                        <label class="form-label">URL Gambar</label>
                        <input type="url" name="gambarUrl" class="form-control"
                               placeholder="https://... (kosongkan untuk placeholder)">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Sinopsis</label>
                        <textarea name="sinopsis" class="form-control" maxlength="1000"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Tambah Film</button>
                </form>
            </section>

            <!-- ===== SERIAL TV FORM ===== -->
            <section>
                <h3 class="section-title">Tambah Serial TV</h3>
                <form th:action="@{/admin/serial}" method="post">
                    <div class="form-group">
                        <label class="form-label">Judul *</label>
                        <input type="text" name="judul" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Tahun Rilis *</label>
                        <input type="number" name="tahunRilis" class="form-control"
                               min="1888" max="2100" value="2026" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Jumlah Musim *</label>
                        <input type="number" name="jumlahMusim" class="form-control"
                               min="1" value="1" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Total Episode *</label>
                        <input type="number" name="totalEpisode" class="form-control"
                               min="1" value="10" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Jaringan TV</label>
                        <input type="text" name="jaringanTV" class="form-control" placeholder="Netflix">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Status</label>
                        <label style="display:flex; align-items:center; gap:0.5rem; color:var(--text-secondary);">
                            <input type="checkbox" name="masihBerjalan" value="true">
                            Masih berjalan (on-going)
                        </label>
                    </div>
                    <div class="form-group">
                        <label class="form-label">URL Gambar</label>
                        <input type="url" name="gambarUrl" class="form-control"
                               placeholder="https://... (kosongkan untuk placeholder)">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Sinopsis</label>
                        <textarea name="sinopsis" class="form-control" maxlength="1000"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Tambah Serial TV</button>
                </form>
            </section>

        </div>
    </main>

</body>
</html>

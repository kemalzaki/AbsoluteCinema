<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lupa Password — AbsoluteCinema</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="manifest" th:href="@{/manifest.json}">
    <meta name="theme-color" content="#ff002b">
    <link rel="icon" type="image/png" sizes="192x192" th:href="@{/images/icon-192.png}">
    <link rel="icon" type="image/svg+xml" th:href="@{/images/icon.svg}">
    <link rel="apple-touch-icon" th:href="@{/images/icon-192.png}">
    <script th:src="@{/js/app.js}" defer></script>
</head>
<body>

    <header th:replace="~{fragments/header :: header}"></header>

    <main class="page container">
        <div class="auth-wrap">
            <h1>Lupa Password</h1>
            <p class="auth-subtitle">Kami akan mengirim kode OTP ke email Anda</p>

            <div class="alert alert-error" th:if="${param.error}">
                Email tidak terdaftar.
            </div>

            <form th:action="@{/forgot-password}" method="post">
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input type="email" id="email" name="email"
                           class="form-control" placeholder="email@contoh.com"
                           required autofocus>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Kirim OTP</button>
            </form>

            <p class="auth-footer">
                <a th:href="@{/login}">Kembali ke Login</a>
            </p>
        </div>
    </main>

</body>
</html>

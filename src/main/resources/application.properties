# Konfigurasi email OTP via Brevo (formerly Sendinblue) SMTP relay.
# Brevo dipilih karena dari Railway/any cloud provider, Gmail SMTP diblokir
# Google pada level TCP (silently drop SYN), sedangkan Brevo dirancang untuk
# pengiriman dari cloud dan punya free tier 300 email/hari yang cukup untuk
# coursework. Tidak butuh verifikasi domain — cukup verifikasi sender email.
#
# Set di Railway:
#   MAIL_USERNAME = email login Brevo (bukan Gmail App Password lagi)
#   MAIL_PASSWORD = Brevo "SMTP Key" dari dashboard Brevo
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# Timeout eksplisit (ms) supaya kegagalan koneksi cepat dilaporkan, bukan
# hang sampai OS TCP timeout. Default angus-mail = infinite (-1).
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

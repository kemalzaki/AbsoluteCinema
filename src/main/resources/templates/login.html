<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — AbsoluteCinema</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="manifest" th:href="@{/manifest.json}">
    <meta name="theme-color" content="#ff002b">
    <script th:src="@{/js/app.js}" defer></script>
</head>
<body>

    <header th:replace="~{fragments/header :: header}"></header>

    <main class="page container">
        <div class="auth-wrap">
            <h1>Login</h1>
            <p class="auth-subtitle">Masuk untuk menulis ulasan</p>

            <!-- Spring Security flashes ?error on bad credentials -->
            <div class="alert alert-error" th:if="${param.error}">
                Username atau password salah.
            </div>
            <!-- ?logout after successful logout -->
            <div class="alert alert-info" th:if="${param.logout}">
                Anda telah logout.
            </div>
            <!-- ?registered after successful registration (from POST /register) -->
            <div class="alert alert-success" th:if="${param.registered}">
                Registrasi berhasil! Silakan login.
            </div>

            <!-- Spring Security default form login: POST /login, fields username + password -->
            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input type="text" id="username" name="username"
                           class="form-control" placeholder="username" required autofocus>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" name="password"
                           class="form-control" placeholder="********" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Login</button>
            </form>

            <p class="auth-footer">
                Belum punya akun? <a th:href="@{/register}">Register di sini</a>
            </p>
        </div>
    </main>

</body>
</html>

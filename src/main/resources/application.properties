# Konfigurasi email OTP via Brevo HTTP API (bukan SMTP).
#
# AWAL CERITA: Railway memblokir outbound SMTP (semua port 25/465/587/2525)
# sebagai anti-spam measure, sehingga JavaMailSender ke smtp.gmail.com ATAU
# smtp-relay.brevo.com sama-sama timeout di TCP level. Brevo punya HTTP API
# (POST https://api.brevo.com/v3/smtp/email) yang berjalan di port 443
# (HTTPS biasa) — tidak diblokir siapapun. EmailService di-rewrite untuk
# memakai HttpClient + REST call alih-alih JavaMailSender/SMTP.
#
# Set di Railway:
#   BREVO_API_KEY = generate dari Brevo dashboard → SMTP & API → API Keys
#   MAIL_FROM     = sender yang sudah diverified di Brevo (absolutecinema0119@gmail.com)
app.brevo.api-key=${BREVO_API_KEY:}
app.mail.from=${MAIL_FROM:}

# Catatan: spring.mail.* TIDAK dipakai lagi (SMTP diblokir Railway). Block
# di bawah ini dibiarkan sebagai dokumentasi/config cadangan jika future
# environment tidak blokir SMTP — tinggal kembalikan EmailService ke versi
# JavaMailSender. Saat ini bean JavaMailSender masih dibuat Spring (tidak
# dipakai), tidak ada efek samping.
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

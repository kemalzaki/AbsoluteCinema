<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog — AbsoluteCinema</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="manifest" th:href="@{/manifest.json}">
    <meta name="theme-color" content="#ff002b">
    <link rel="icon" type="image/png" sizes="192x192" th:href="@{/images/icon-192.png}">
    <link rel="icon" type="image/svg+xml" th:href="@{/images/icon.svg}">
    <link rel="apple-touch-icon" th:href="@{/images/icon-192.png}">
    <script th:src="@{/js/app.js}" defer></script>
</head>
<body>

    <header th:replace="~{fragments/header :: header}"></header>

    <main class="page container">
        <h2 style="margin-bottom: 1.5rem;">Movies Collection</h2>

          <!-- Search Bar -->
<div class="search-box">
    <input type="text" id="searchInput"
           placeholder="Cari film atau serial..."
           onkeyup="searchMovies()">
</div>
          
        <!-- Filter bar: All / Film / Serial TV (functional) -->
        <div class="filters">
            <a class="filter-btn" th:href="@{/katalog}"
               th:classappend="${activeType == 'ALL'} ? 'active' : ''">All</a>
            <a class="filter-btn" th:href="@{/katalog(type='FILM')}"
               th:classappend="${activeType == 'FILM'} ? 'active' : ''">Film</a>
            <a class="filter-btn" th:href="@{/katalog(type='SERIAL_TV')}"
               th:classappend="${activeType == 'SERIAL_TV'} ? 'active' : ''">Serial TV</a>
            <!-- Genre filters: visual placeholder (no genre index yet) -->
            <!-- <a class="filter-btn" th:href="@{/katalog}">Action</a> -->
        </div>

        <div class="movie-grid" th:if="${!tayangans.isEmpty()}">
            <a class="movie-card" th:each="t : ${tayangans}" th:href="@{/tayangan/{id}(id=${t.id})}">
                <img th:src="${not #strings.isEmpty(t.gambarUrl) ? t.gambarUrl : '/images/poster-placeholder.svg'}"
                     th:alt="${t.judul}" class="movie-img">
                <div class="movie-info">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:0.5rem;">
                        <span class="badge badge-film" th:if="${t instanceof T(com.oop.absolutecinema.entity.Film)}">Film</span>
                        <span class="badge badge-serial" th:if="${t instanceof T(com.oop.absolutecinema.entity.SerialTV)}">Serial TV</span>
                    </div>
                    <h3 class="movie-title" th:text="${t.judul}">Title</h3>
                    <div class="movie-rating">
                        <span class="stars">★★★★★</span>
                        <span th:text="${#numbers.formatDecimal(t.hitungRatingRataRata(), 1, 1)}">0.0</span>
                    </div>
                    <span class="btn btn-outline btn-full">View Details</span>
                </div>
            </a>
        </div>

        <p class="empty-state" th:if="${tayangans.isEmpty()}">
            Tidak ada tayangan untuk kategori ini.
        </p>
    </main>
<script>
function searchMovies() {
    let input = document.getElementById("searchInput").value.toLowerCase();
    let cards = document.querySelectorAll(".movie-card");

    cards.forEach(card => {
        let title = card.querySelector(".movie-title").textContent.toLowerCase();

        if (title.includes(input)) {
            card.style.display = "";
        } else {
            card.style.display = "none";
        }
    });
}
</script>
</body>
</html>

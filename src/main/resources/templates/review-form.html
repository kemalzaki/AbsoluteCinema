<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Ulas — ' + ${tayangan.judul}">Ulas</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="manifest" th:href="@{/manifest.json}">
    <meta name="theme-color" content="#ff002b">
    <link rel="icon" type="image/png" sizes="192x192" th:href="@{/images/icon-192.png}">
    <link rel="icon" type="image/svg+xml" th:href="@{/images/icon.svg}">
    <link rel="apple-touch-icon" th:href="@{/images/icon-192.png}">
    <script th:src="@{/js/app.js}" defer></script>
</head>
<body>

    <header th:replace="~{fragments/header :: header}"></header>

    <main class="page container">
        <div style="max-width: 640px; margin: 0 auto;">

            <div style="margin-bottom: 1rem;">
                <a th:href="@{/tayangan/{id}(id=${tayangan.id})}" class="btn btn-outline btn-small">&larr; Kembali ke Detail</a>
            </div>

            <div class="detail-header">
                <h1>Tulis Ulasan</h1>
                <p class="auth-subtitle" style="margin-top:0.5rem;">
                    untuk <a th:href="@{/tayangan/{id}(id=${tayangan.id})}"
                             style="color: var(--primary-color); font-weight:600;"
                             th:text="${tayangan.judul}">Title</a>
                </p>
            </div>

            <div class="alert alert-error" id="review-alert" style="display:none;"></div>

            <form id="review-form">
                <div class="form-group">
                    <label class="form-label">Rating (1–5)</label>
                    <div class="interactive-stars" id="star-input" role="radiogroup" aria-label="Rating 1 sampai 5">
                        <span data-value="1">★</span>
                        <span data-value="2">★</span>
                        <span data-value="3">★</span>
                        <span data-value="4">★</span>
                        <span data-value="5">★</span>
                    </div>
                    <!-- Hidden field dikirim bersama submit; skor dipilih lewat bintang -->
                    <input type="hidden" id="skor" name="skor" value="5">
                </div>
                <div class="form-group">
                    <label class="form-label" for="teks">Ulasan</label>
                    <textarea id="teks" name="teks" class="form-control"
                              maxlength="1000" required
                              placeholder="Bagikan pendapatmu tentang tayangan ini..."></textarea>
                </div>
                <div style="display:flex; gap:1rem;">
                    <button type="submit" id="submit-btn" class="btn btn-primary">Kirim Ulasan</button>
                    <a class="btn btn-outline" th:href="@{/tayangan/{id}(id=${tayangan.id})}">Batal</a>
                </div>
            </form>

        </div>
    </main>

    <!-- Inject IDs from model + session for the fetch payload -->
    <script th:inline="javascript">
        const CURRENT_USER_ID = /*[[${currentUserId}]]*/ null;
        const TAYANGAN_ID = /*[[${tayangan.id}]]*/ null;
        const DETAIL_URL = /*[[@{/tayangan/{id}(id=${tayangan.id})}]]*/ '/tayangan/' + TAYANGAN_ID;

        // --- Star rating picker (1-5) ---
        const stars = document.querySelectorAll('#star-input span');
        const skorInput = document.getElementById('skor');
        let selected = 5; // default 5 bintang

        function paint(n) {
            stars.forEach((s, i) => s.classList.toggle('active', i < n));
        }

        stars.forEach((s, i) => {
            s.addEventListener('mouseenter', () => paint(i + 1));
            s.addEventListener('click', () => {
                selected = i + 1;
                skorInput.value = selected;
                paint(selected);
            });
        });
        document.getElementById('star-input').addEventListener('mouseleave', () => paint(selected));
        paint(selected);

        // --- Submit handler (disable button + redirect with success flag) ---
        document.getElementById('review-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const alertBox = document.getElementById('review-alert');
            const submitBtn = document.getElementById('submit-btn');
            const teks = document.getElementById('teks').value;

            alertBox.style.display = 'none';

            if (!teks) {
                alertBox.textContent = 'Tolong lengkapi semua field!';
                alertBox.style.display = 'block';
                return;
            }

            // Kunci tombol supaya tidak bisa submit berkali-kali
            submitBtn.disabled = true;
            submitBtn.textContent = 'Mengirim...';

            const payload = {
                userId: CURRENT_USER_ID,
                tayanganId: TAYANGAN_ID,
                skor: parseInt(skorInput.value, 10),
                teks: teks
            };

            try {
                const response = await fetch('/api/reviews', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    // Kembali ke detail + tampilkan flash "berhasil"
                    window.location.href = DETAIL_URL + '?reviewed';
                } else {
                    const msg = await response.text();
                    alertBox.textContent = 'Gagal: ' + msg;
                    alertBox.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Kirim Ulasan';
                }
            } catch (err) {
                console.error('Error submitting review:', err);
                alertBox.textContent = 'Terjadi kesalahan jaringan.';
                alertBox.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Kirim Ulasan';
            }
        });
    </script>

</body>
</html>

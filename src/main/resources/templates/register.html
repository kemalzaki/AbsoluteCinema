<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — AbsoluteCinema</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="manifest" th:href="@{/manifest.json}">
    <meta name="theme-color" content="#ff002b">
    <link rel="icon" type="image/png" sizes="192x192" th:href="@{/images/icon-192.png}">
    <link rel="icon" type="image/svg+xml" th:href="@{/images/icon.svg}">
    <link rel="apple-touch-icon" th:href="@{/images/icon-192.png}">
    <script th:src="@{/js/app.js}" defer></script>
</head>
<body>

    <header th:replace="~{fragments/header :: header}"></header>

    <main class="page container">
        <div class="auth-wrap">
            <h1>Register</h1>
            <p class="auth-subtitle">Buat akun baru untuk mulai mengulas</p>

            <!-- POST /register handled by UIController -->
            <form th:action="@{/register}" method="post">
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input type="text" id="username" name="username"
                           class="form-control" placeholder="min. 4 karakter"
                           minlength="4" required autofocus>
                </div>
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input type="email" id="email" name="email"
                           class="form-control" placeholder="email@contoh.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" name="password"
                           class="form-control" placeholder="min. 8 karakter"
                           minlength="8" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Register</button>
            </form>

            <p class="auth-footer">
                Sudah punya akun? <a th:href="@{/login}">Login di sini</a>
            </p>
        </div>
    </main>

</body>
</html>

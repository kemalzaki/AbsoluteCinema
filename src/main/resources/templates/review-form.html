<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Ulas — ' + ${tayangan.judul}">Ulas</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <header th:replace="~{fragments/header :: header}"></header>

    <main class="page container">
        <div style="max-width: 640px; margin: 0 auto;">

            <div class="detail-header">
                <h1>Tulis Ulasan</h1>
                <p class="auth-subtitle" style="margin-top:0.5rem;">
                    untuk <a th:href="@{/tayangan/{id}(id=${tayangan.id})}"
                             style="color: var(--primary-color); font-weight:600;"
                             th:text="${tayangan.judul}">Title</a>
                </p>
            </div>

            <div class="alert alert-error" id="review-alert" style="display:none;"></div>

            <form id="review-form">
                <div class="form-group">
                    <label class="form-label" for="skor">Rating (1–5)</label>
                    <input type="number" id="skor" name="skor"
                           class="form-control" min="1" max="5" value="5" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="teks">Ulasan</label>
                    <textarea id="teks" name="teks" class="form-control"
                              maxlength="1000" required
                              placeholder="Bagikan pendapatmu tentang tayangan ini..."></textarea>
                </div>
                <div style="display:flex; gap:1rem;">
                    <button type="submit" class="btn btn-primary">Kirim Ulasan</button>
                    <a class="btn btn-outline" th:href="@{/tayangan/{id}(id=${tayangan.id})}">Batal</a>
                </div>
            </form>

        </div>
    </main>

    <!-- Inject IDs from model + session for the fetch payload -->
    <script th:inline="javascript">
        const CURRENT_USER_ID = /*[[${currentUserId}]]*/ null;
        const TAYANGAN_ID = /*[[${tayangan.id}]]*/ null;
        const DETAIL_URL = /*[[@{/tayangan/{id}(id=${tayangan.id})}]]*/ '/tayangan/' + TAYANGAN_ID;

        document.getElementById('review-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const alertBox = document.getElementById('review-alert');
            const skor = document.getElementById('skor').value;
            const teks = document.getElementById('teks').value;

            if (!skor || !teks) {
                alertBox.textContent = 'Tolong lengkapi semua field!';
                alertBox.style.display = 'block';
                return;
            }

            const payload = {
                userId: CURRENT_USER_ID,
                tayanganId: TAYANGAN_ID,
                skor: parseInt(skor, 10),
                teks: teks
            };

            try {
                const response = await fetch('/api/reviews', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    window.location.href = DETAIL_URL;
                } else {
                    const msg = await response.text();
                    alertBox.textContent = 'Gagal: ' + msg;
                    alertBox.style.display = 'block';
                }
            } catch (err) {
                console.error('Error submitting review:', err);
                alertBox.textContent = 'Terjadi kesalahan jaringan.';
                alertBox.style.display = 'block';
            }
        });
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AbsoluteCinema Reviews</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="manifest" th:href="@{/manifest.json}">
    <meta name="theme-color" content="#ff002b">
    <link rel="icon" type="image/png" sizes="192x192" th:href="@{/images/icon-192.png}">
    <link rel="icon" type="image/svg+xml" th:href="@{/images/icon.svg}">
    <link rel="apple-touch-icon" th:href="@{/images/icon-192.png}">
    <script th:src="@{/js/app.js}" defer></script>
</head>
<body>

    <!-- Shared header / nav -->
    <header th:replace="~{fragments/header :: header}"></header>

    <section class="hero">
        <div class="hero-content">
            <h1>AbsoluteCinema <span class="text-primary">Reviews</span></h1>
            <p>Discover. Review. Rate.</p>
            <div class="btn-group">
                <a class="btn btn-primary" th:href="@{/katalog}">Explore Catalog</a>
                <a class="btn btn-outline" sec:authorize="isAnonymous()" th:href="@{/register}">Get Started</a>
                <a class="btn btn-outline" sec:authorize="isAuthenticated()" th:href="@{/katalog}">Write a Review</a>
            </div>
        </div>
    </section>

    <main class="container">
        <div class="section-header">
            <h2>Featured Movies</h2>
            <a class="btn btn-outline btn-small" th:href="@{/katalog}">View All</a>
        </div>
        <div class="movie-grid">
            <a class="movie-card" th:each="t : ${tayangans}" th:href="@{/tayangan/{id}(id=${t.id})}">
                <img th:src="${not #strings.isEmpty(t.gambarUrl) ? t.gambarUrl : '/images/poster-placeholder.svg'}"
                     th:alt="${t.judul}" class="movie-img">
                <div class="movie-info">
                    <h3 class="movie-title" th:text="${t.judul}">Title</h3>
                    <div class="movie-rating">
                        <span class="stars">★★★★★</span>
                        <span th:text="${#numbers.formatDecimal(t.hitungRatingRataRata(), 1, 1)}">0.0</span>
                    </div>
                    <span class="btn btn-primary btn-full">View Details</span>
                </div>
            </a>
        </div>

        <p class="empty-state" th:if="${tayangans.isEmpty()}">
            Belum ada tayangan. Jalankan seed database terlebih dahulu.
        </p>
    </main>

    <footer class="footer">
        <p>&copy; 2026 AbsoluteCinema Reviews. Built for OOP coursework.</p>
    </footer>

</body>
</html>

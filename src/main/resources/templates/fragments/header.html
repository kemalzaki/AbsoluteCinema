<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<body>

<header th:fragment="header">
    <a th:href="@{/}" class="logo" aria-label="AbsoluteCinema Reviews — Home">
        <span class="logo-mark" aria-hidden="true">AC</span>
        <span class="logo-text">
            AbsoluteCinema <span class="text-primary">Reviews</span>
        </span>
    </a>

    <button class="nav-toggle" type="button"
            aria-label="Toggle navigation menu"
            aria-controls="main-nav"
            aria-expanded="false">
        <span></span><span></span><span></span>
    </button>

    <nav id="main-nav" aria-label="Main navigation">
        <a th:href="@{/}">Home</a>
        <a th:href="@{/katalog}">Katalog</a>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin}">Admin</a>

        <a sec:authorize="isAuthenticated()"
           th:href="@{/logout}"
           onclick="return confirm('Logout sekarang?');">
            Logout
        </a>

        <a sec:authorize="isAnonymous()" th:href="@{/login}">Login</a>
        <a sec:authorize="isAnonymous()" th:href="@{/register}">Register</a>
    </nav>
</header>

</body>
</html>
